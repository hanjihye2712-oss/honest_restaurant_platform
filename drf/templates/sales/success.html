{% extends "base.html" %}
{% load static humanize %}

{% block title %}결제 성공 | 정직순대국{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/sales/sales.css' %}">
{% endblock %}

{% block content %}
<section class="success-page">
  <h2>결제 성공 ✓</h2>
  <div class="success-info">
    <p>
      <span class="label">주문번호</span>
      <span class="value">{{ order_id }}</span>
    </p>
    <p>
      <span class="label">결제 금액</span>
      <span class="value">{{ amount|intcomma }}원</span>
    </p>
    <p>
      <span class="label">결제 키</span>
      <span class="value">{{ payment_key }}</span>
    </p>
  </div>
  <a class="back-link" href="/">← 홈으로</a>
</section>
{% endblock %}
