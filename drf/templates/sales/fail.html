{% extends "base.html" %}
{% load static %}

{% block title %}결제 실패 | 정직순대국{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/sales/sales.css' %}">
{% endblock %}

{% block content %}
<section class="fail-page">
  <h2>결제 실패</h2>
  <div class="fail-info">
    <p>
      <span class="label">에러코드</span>
      <span class="value">{{ code }}</span>
    </p>
    <p>
      <span class="label">실패 사유</span>
      <span class="value">{{ message }}</span>
    </p>
  </div>
  <a class="back-link" href="{% url 'sales:checkout' %}">← 다시 시도</a>
</section>
{% endblock %}
