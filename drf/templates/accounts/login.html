{% extends "base.html" %}
{% load static %}
{% load socialaccount %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <h2 class="auth-title">로그인</h2>

    <div class="auth-form" id="login-form">
      <div id="login-error" class="errorlist" style="display:none;list-style:none;padding:0;margin-bottom:12px;">
        <p style="font-size:12px;color:var(--red);font-weight:700;margin:0;"></p>
      </div>

      <p>
        <label for="id_username">아이디</label>
        <input type="text" id="id_username" placeholder="아이디" autocomplete="username">
      </p>
      <p>
        <label for="id_password">비밀번호</label>
        <input type="password" id="id_password" placeholder="비밀번호" autocomplete="current-password">
      </p>

      <button type="button" class="auth-btn" id="btn-login">로그인</button>
    </div>

    <div class="auth-divider" style="margin:20px 0;text-align:center;color:#999;font-size:12px;">
      또는
    </div>

    <div class="social-login" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
      <a href="{% provider_login_url 'kakao' %}" class="social-btn kakao-btn" style="padding:12px;border-radius:4px;background:#FEE500;color:#000;text-align:center;font-weight:600;text-decoration:none;cursor:pointer;">
        카카오로 간편 로그인하기
      </a>
      <a href="{% provider_login_url 'naver' %}" class="social-btn naver-btn" style="padding:12px;border-radius:4px;background:#00C73C;color:#fff;text-align:center;font-weight:600;text-decoration:none;cursor:pointer;">
        네이버로 간편 로그인하기
      </a>
    </div>

    <a href="{% url 'signup' %}" class="auth-link">회원가입하기</a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<div id="login-meta" style="display:none;"
     data-login-url="/accounts/api/ajax-login/"
     data-next="{{ request.GET.next|default:'/' }}"></div>
<script src="{% static 'js/accounts/login.js' %}"></script>
{% endblock %}
