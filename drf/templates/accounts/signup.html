{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <h2 class="auth-title">회원가입</h2>

    <div class="auth-form" id="signup-form">
      <div id="signup-error" style="display:none;margin-bottom:12px;"></div>

      <p>
        <label for="id_username">아이디</label>
        <input type="text" id="id_username" placeholder="아이디" autocomplete="username">
        <ul id="err-username" class="errorlist" style="display:none;list-style:none;padding:0;margin:4px 0 0;"></ul>
      </p>
      <p>
        <label for="id_password1">비밀번호</label>
        <input type="password" id="id_password1" placeholder="비밀번호" autocomplete="new-password">
        <ul id="err-password1" class="errorlist" style="display:none;list-style:none;padding:0;margin:4px 0 0;"></ul>
      </p>
      <p>
        <label for="id_password2">비밀번호 확인</label>
        <input type="password" id="id_password2" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
        <ul id="err-password2" class="errorlist" style="display:none;list-style:none;padding:0;margin:4px 0 0;"></ul>
      </p>

      <button type="button" class="auth-btn" id="btn-signup">가입</button>
    </div>

    <a href="{% url 'login' %}" class="auth-link">이미 계정이 있으신가요?</a>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/accounts/signup.js' %}"></script>
{% endblock %}
