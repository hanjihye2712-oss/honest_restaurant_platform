{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>{% block title %}정직식당{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/base.css' %}?v=3">
  <link rel="stylesheet" href="{% static 'css/header.css' %}?v=3">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}?v=3">
  <link rel="stylesheet" href="{% static 'css/honest_restaurant/restaurant_list.css' %}?v=3">

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include "header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  <!-- 맨 위로 버튼 -->
  <button id="scroll-top-btn" aria-label="맨 위로"></button>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  {% block extra_js %}{% endblock %}

  <!-- ── 전역 커스텀 모달 (alert / confirm 공용) ── -->
  <div id="g-modal-overlay" style="
    display:none;position:fixed;inset:0;z-index:99999;
    align-items:center;justify-content:center;
    background:rgba(26,39,68,.5);backdrop-filter:blur(2px);
  ">
    <div style="
      background:var(--cream);border:2px solid var(--navy);
      max-width:360px;width:88%;padding:32px 28px 24px;
      text-align:center;box-shadow:6px 6px 0 var(--navy);
    ">
      <p id="g-modal-msg" style="
        font-size:15px;color:var(--ink);line-height:1.8;
        margin:0 0 22px;white-space:pre-line;
      "></p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button id="g-modal-ok" style="
          background:var(--navy);color:var(--cream);border:none;
          padding:10px 36px;font-family:var(--ff-deco);font-size:14px;
          cursor:pointer;letter-spacing:.05em;
        ">확인</button>
        <button id="g-modal-cancel" style="
          display:none;
          background:transparent;color:var(--navy);
          border:2px solid var(--navy);
          padding:10px 24px;font-family:var(--ff-deco);font-size:14px;
          cursor:pointer;letter-spacing:.05em;
        ">취소</button>
      </div>
    </div>
  </div>
  <script src="{% static 'js/base.js' %}"></script>

</body>
</html>
