{% load static %}
<!-- ── 마케팅 생성 모달 ── -->
<div class="mkt-overlay" id="mktOverlay">
  <div class="mkt-modal">
    <button class="mkt-close" id="btn-mkt-close">✕</button>

    <!-- STEP 1: 입력 -->
    <div class="mkt-step active" id="mkt-step-1">
      <div class="mkt-modal-title">AI 마케팅</div>
      <p class="mkt-modal-sub">키워드나 한두 문장을 입력하면 AI가 SNS 글을 작성해 드립니다</p>

      <label class="mkt-label">키워드 또는 문장 입력</label>
      <textarea class="mkt-textarea" id="mkt-input"
        placeholder="예) 새벽 5시 김밥, 20년 전통, 3500원 그대로&#10;또는: 오늘 반찬이 특히 맛있게 됐어요. 점심 특선 추천합니다."></textarea>

      <label class="mkt-label" style="margin-top:20px">발행 플랫폼 선택</label>
      <div class="platform-btns">
        {% for p in active_platforms %}
        <button class="platform-btn{% if forloop.first %} selected{% endif %}"
                data-p="{{ p.platform }}">{{ p.display_name }}</button>
        {% empty %}
        <p style="color:var(--muted);font-size:13px">활성화된 플랫폼이 없습니다.</p>
        {% endfor %}
      </div>

      <button class="btn-poster-p" id="btn-mkt-generate"
        style="width:100%;padding:14px;font-size:15px">AI 글 생성하기</button>
    </div>

    <!-- STEP 2: 생성 중 -->
    <div class="mkt-step" id="mkt-step-2">
      <div class="mkt-generating">
        <div style="font-family:var(--ff-poster);font-size:22px;color:var(--navy)">AI가 글을 작성 중입니다</div>
        <p style="font-size:13px;color:var(--muted);margin-top:8px">가게 정보와 키워드를 분석하고 있어요</p>
        <div class="mkt-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- STEP 3: 결과 -->
    <div class="mkt-step" id="mkt-step-3">
      <div class="mkt-modal-title">생성 완료</div>
      <p class="mkt-modal-sub">내용과 태그를 수정한 뒤 복사하세요</p>

      <div class="mkt-result-box">
        <textarea class="mkt-edit-area" id="mkt-edit-area"></textarea>
        <div class="mkt-tags-label">태그에 활용하세요</div>
        <textarea class="mkt-tags-edit" id="mkt-tags-row" rows="2" placeholder="#해시태그를 입력하세요"></textarea>
      </div>

      <button class="mkt-copy-btn" id="btn-mkt-copy" style="margin-top:16px">글 복사하기</button>
    </div>
  </div>
</div>

<!-- 플랫폼 라벨 맵 (JS에서 사용) -->
{{ active_platforms|json_script:"mkt-platform-data" }}

<!-- 토스트 -->
<div class="mkt-toast" id="mktToast"></div>
