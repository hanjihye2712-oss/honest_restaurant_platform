{% extends "base.html" %}
{% load static %}

{% block title %}마케팅 글 관리 — 정직식당{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/marketing/marketing.css' %}">
{% endblock %}

{% block content %}


<div class="mkt-manage-wrap">

  <!-- 상단: 새 글 생성 + 필터 탭 -->
  <div class="mmw-toolbar">
    <button class="btn-poster-p" id="btn-mkt-open"
            style="padding:9px 20px;font-size:13px">+ 새 글 생성</button>
    <div class="mmw-filters">
      <button class="mmf-btn active" data-filter="all">
        전체 <span class="mmf-cnt" id="cnt-all">0</span>
      </button>
      <button class="mmf-btn" data-filter="draft">
        임시저장 <span class="mmf-cnt" id="cnt-draft">0</span>
      </button>
      <button class="mmf-btn" data-filter="scheduled">
        예약 <span class="mmf-cnt" id="cnt-scheduled">0</span>
      </button>
      <button class="mmf-btn" data-filter="published">
        발행완료 <span class="mmf-cnt" id="cnt-published">0</span>
      </button>
    </div>
  </div>

  <!-- 글 목록 테이블 -->
  <div class="mmw-table-wrap">
    <table class="mmw-table">
      <thead>
        <tr>
          <th style="width:90px">플랫폼</th>
          <th style="width:80px">상태</th>
          <th>내용</th>
          <th style="width:130px">일시</th>
          <th style="width:120px">관리</th>
        </tr>
      </thead>
      <tbody id="mkt-manage-body">
        <tr>
          <td colspan="5" class="mmw-empty">아직 작성된 글이 없습니다.</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

{% include "marketing/partials/marketing_modal.html" %}

{% endblock %}

{% block extra_js %}
<script src="{% static 'js/marketing/marketing.js' %}"></script>
<script>
  // 관리 페이지 초기화
  document.addEventListener('DOMContentLoaded', () => {
    renderManageTable('all');
  });
</script>
{% endblock %}
