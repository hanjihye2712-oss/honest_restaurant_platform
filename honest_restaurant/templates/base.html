{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}정직식당{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/base.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'css/header.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'css/footer.css' %}?v=2">
  <link rel="stylesheet" href="{% static 'css/restaurant_list.css' %}?v=2">

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include "partials/header.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  {% block extra_js %}{% endblock %}

</body>
</html>
