{% load static %}
<!-- ── 마케팅 생성 모달 ── -->
<div class="mkt-overlay" id="mktOverlay">
  <div class="mkt-modal">
    <button class="mkt-close" id="btn-mkt-close">✕</button>

    <!-- STEP 1: 입력 -->
    <div class="mkt-step active" id="mkt-step-1">
      <div class="mkt-modal-title">오늘의 마케팅</div>
      <p class="mkt-modal-sub">키워드나 한두 문장을 입력하면 AI가 SNS 글을 작성해 드립니다</p>

      <label class="mkt-label">키워드 또는 문장 입력</label>
      <textarea class="mkt-textarea" id="mkt-input"
        placeholder="예) 새벽 5시 김밥, 20년 전통, 3500원 그대로&#10;또는: 오늘 반찬이 특히 맛있게 됐어요. 점심 특선 추천합니다."></textarea>

      <label class="mkt-label" style="margin-top:20px">발행 플랫폼 선택</label>
      <div class="platform-btns">
        <button class="platform-btn selected" data-p="instagram">Instagram</button>
        <button class="platform-btn" data-p="facebook">Facebook</button>
        <button class="platform-btn" data-p="naver_blog">네이버 블로그</button>
        <button class="platform-btn" data-p="kakao_story">카카오스토리</button>
      </div>

      <button class="btn-poster-p" id="btn-mkt-generate"
        style="width:100%;padding:14px;font-size:15px">AI 글 생성하기</button>
    </div>

    <!-- STEP 2: 생성 중 -->
    <div class="mkt-step" id="mkt-step-2">
      <div class="mkt-generating">
        <div style="font-family:var(--ff-poster);font-size:22px;color:var(--navy)">AI가 글을 작성 중입니다</div>
        <p style="font-size:13px;color:var(--muted);margin-top:8px">가게 정보와 키워드를 분석하고 있어요</p>
        <div class="mkt-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <!-- STEP 3: 결과 및 발행 -->
    <div class="mkt-step" id="mkt-step-3">
      <div class="mkt-modal-title">생성 완료</div>
      <p class="mkt-modal-sub">내용을 수정한 뒤 발행 방식을 선택하세요</p>

      <div class="mkt-result-box">
        <div class="mkt-result-plat" id="mkt-result-plat">Instagram</div>
        <textarea class="mkt-edit-area" id="mkt-edit-area"></textarea>
        <div class="mkt-tags-row" id="mkt-tags-row"></div>
      </div>

      <div class="mkt-publish-row">
        <button class="btn-poster-s" id="btn-schedule">📅 예약 발행</button>
        <button class="btn-poster-p" id="btn-publish-now">즉시 발행</button>
      </div>

      <div class="mkt-schedule-box" id="mkt-schedule-box">
        <label class="mkt-label">발행 날짜 · 시간 설정</label>
        <div class="mkt-dt-row">
          <input type="datetime-local" id="mkt-datetime">
          <button class="btn-poster-p" id="btn-schedule-confirm"
            style="padding:8px 18px;white-space:nowrap">예약 확정</button>
        </div>
      </div>

      <button class="btn-poster-s" id="btn-mkt-back"
        style="width:100%;margin-top:12px;padding:10px">← 다시 작성</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="mkt-toast" id="mktToast"></div>
